name: Terraform Dev

# Only manual dispatch for extra security on a public repo
on:
  workflow_dispatch:

jobs:
  terraform-plan:
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
    defaults:
      run:
        working-directory: terraform
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
      - name: Terraform Init
        run: terraform init -backend-config=environments/dev/dev.backend.conf
      - name: Terraform Plan
        run: terraform plan -var-file=environments/dev/dev.tfvars
  terraform-apply:
    needs: terraform-plan
    runs-on: ubuntu-latest
    environment: dev-infra
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
    defaults:
      run:
        working-directory: terraform
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
      - name: Terraform Init
        run: terraform init -backend-config=environments/dev/dev.backend.conf
      - name: Zip Lambda Functions
        run: |           # pip install -r requirements.txt -t .
          cd ./lambda/
          zip -r process_chat.zip .
          zip -r get_random_message.zip .
      - name: Terraform Apply
        run: terraform apply -auto-approve -var-file=environments/dev/dev.tfvars
